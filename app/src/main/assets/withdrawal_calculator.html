<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>퇴직 후 인출 계산기</title>
<style>
:root {
  --ink: #1a1612; --paper: #f5f0e8; --paper2: #ede8dd; --paper3: #e4ddd0;
  --warm: #8b6914; --warm-light: #c49a2a; --warm-pale: #f0e4c0;
  --rust: #a0412a; --rust-light: #d4634a;
  --green: #2a6640; --green-light: #3d9458; --green-pale: #d4ead9;
  --text: #2a2420; --text-muted: #7a6e62; --border: #c8bfae; --shadow: rgba(26,22,18,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper); color: var(--text);
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', serif;
  min-height: 100vh; padding: 24px 14px 80px; -webkit-text-size-adjust: 100%;
}
.container { max-width: 900px; margin: 0 auto; }
header {
  text-align: center; margin-bottom: 28px; padding-bottom: 22px;
  border-bottom: 2px solid var(--border); position: relative;
}
header::after {
  content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 1px; background: var(--border);
}
.eyebrow { font-family: monospace; font-size: 9px; letter-spacing: 4px; color: var(--warm); text-transform: uppercase; margin-bottom: 10px; }
h1 { font-size: 26px; font-weight: 800; color: var(--ink); line-height: 1.15; letter-spacing: -0.5px; }
h1 em { font-style: italic; color: var(--warm); }
.subtitle { font-size: 13px; color: var(--text-muted); margin-top: 8px; line-height: 1.6; }
.section {
  background: white; border: 1px solid var(--border); border-radius: 4px;
  padding: 20px 16px 18px; margin-bottom: 16px;
  box-shadow: 0 2px 10px var(--shadow); position: relative;
}
.section::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%; background: var(--warm-light); border-radius: 4px 0 0 4px;
}
.section-title { font-family: monospace; font-size: 9px; letter-spacing: 3px; color: var(--warm); text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--paper3); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 400px) { .grid-2 { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 6px; }
label { font-size: 11px; color: var(--text-muted); font-family: monospace; }
.input-wrap { position: relative; display: flex; align-items: center; }
.pfx { position: absolute; left: 10px; font-family: monospace; font-size: 11px; color: var(--text-muted); pointer-events: none; }
input[type="number"], input[type="text"], select {
  width: 100%; background: var(--paper); border: 1px solid var(--border); border-radius: 4px;
  padding: 12px 12px 12px 28px; color: var(--text);
  font-family: monospace; font-size: 15px; outline: none;
  transition: border-color 0.2s; -moz-appearance: textfield; appearance: textfield; -webkit-appearance: none;
}
input[type="text"] { padding-left: 12px; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type="number"]:focus, input[type="text"]:focus, select:focus { border-color: var(--warm-light); background: var(--warm-pale); }
select { padding-left: 12px; cursor: pointer; }

.pension-item {
  border: 1px dashed var(--border); border-radius: 4px; padding: 14px; margin-bottom: 14px; background: #faf8f5; position: relative;
}
.remove-pension {
  position: absolute; top: -8px; right: -8px; width: 22px; height: 22px;
  background: var(--rust); color: white; border: none; border-radius: 50%;
  font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.range-block { display: flex; flex-direction: column; gap: 8px; }
.range-header { display: flex; justify-content: space-between; align-items: baseline; }
.range-label { font-size: 11px; color: var(--text-muted); font-family: monospace; }
.range-val { font-family: monospace; font-size: 16px; font-weight: 500; color: var(--warm); }
input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; background: var(--paper3); border-radius: 2px; outline: none; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px;
  background: white; border: 2px solid var(--warm-light); border-radius: 50%;
  cursor: pointer; box-shadow: 0 1px 4px var(--shadow);
}
.tabs { display: flex; margin-bottom: 18px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.tab {
  flex: 1; padding: 10px 6px; background: var(--paper); border: none; cursor: pointer;
  font-family: monospace; font-size: 10px; color: var(--text-muted);
  transition: background 0.2s, color 0.2s; border-right: 1px solid var(--border); line-height: 1.4;
  -webkit-tap-highlight-color: transparent;
}
.tab:last-child { border-right: none; }
.tab.active { background: var(--warm-light); color: white; font-weight: 500; }
.tab:active:not(.active) { background: var(--warm-pale); }
.btn {
  width: 100%; background: var(--ink); color: var(--paper);
  border: none; border-radius: 4px; padding: 16px;
  font-size: 16px; font-weight: 700;
  cursor: pointer; letter-spacing: 1px; margin-top: 8px; -webkit-tap-highlight-color: transparent;
}
.btn.outline { background: transparent; border: 1px solid var(--ink); color: var(--ink); margin-top: 0; padding: 10px; font-size: 12px; }
.btn:active { opacity: 0.85; }
.results { display: none; }
.results.visible { display: block; animation: reveal 0.4s ease; }
@keyframes reveal { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.kpi-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
.kpi { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 14px 12px; text-align: center; box-shadow: 0 1px 6px var(--shadow); }
.kpi.danger { border-color: var(--rust-light); background: #fff8f6; }
.kpi.success { border-color: #90c89a; background: #f5fbf6; }
.kpi.warn { border-color: var(--warm-light); background: #fffbf0; }
.kpi-label { font-family:monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
.kpi-val { font-size:20px; font-weight:800; color:var(--ink); line-height:1; font-family:monospace; }
.kpi-val.red { color: var(--rust); } .kpi-val.green { color: var(--green); } .kpi-val.gold { color: var(--warm); }
.kpi-sub { font-size:10px; color:var(--text-muted); margin-top:4px; font-family:monospace; }
.swr-banner { background:#fffbf0; border:1px solid var(--warm-light); border-radius:4px; padding:14px 16px; margin-bottom:16px; font-family:monospace; }
.swr-rate { font-size:28px; font-weight:800; color:var(--warm); }
.swr-desc { font-size:12px; color:var(--text-muted); margin-top:4px; }
.banner { padding:13px 16px; border-radius:4px; margin-bottom:16px; display:flex; align-items:center; gap:10px; font-size:14px; font-weight:700; border:1px solid; }
.banner.ok { background:var(--green-pale); border-color:#90c89a; color:var(--green); }
.banner.ng { background:#fce8e4; border-color:#e0a090; color:var(--rust); }
.chart-wrap { position:relative; height:240px; }
.table-toggle {
  background:none; border:1px solid var(--border); color:var(--text-muted);
  padding:9px 16px; border-radius:4px; cursor:pointer;
  font-size:11px; font-family:monospace; margin-top:14px; -webkit-tap-highlight-color:transparent;
}
.table-scroll { max-height:320px; overflow-y:auto; border:1px solid var(--border); border-radius:4px; margin-top:12px; -webkit-overflow-scrolling:touch; }
table { width:100%; border-collapse:collapse; font-family:monospace; font-size:11px; }
thead { position:sticky; top:0; background:var(--paper2); z-index:2; }
th { padding:9px 10px; text-align:right; color:var(--text-muted); font-size:9px; letter-spacing:1px; text-transform:uppercase; border-bottom:1px solid var(--border); font-weight:400; }
th:first-child { text-align:left; }
td { padding:8px 10px; text-align:right; color:var(--text-muted); border-bottom:1px solid rgba(200,191,174,0.4); }
td:first-child { text-align:left; color:var(--text); }
tr.depleted td { color:var(--rust-light) !important; background:#fff5f3; }
tr.last-year td { color:var(--green) !important; background:#f4fbf5; font-weight:500; }
.tag { display:inline-block; background:var(--rust-light); color:white; padding:1px 5px; border-radius:2px; font-size:8px; margin-left:3px; vertical-align:middle; }
.tag.ok { background:var(--green-light); }
.scenario-grid { display:grid; grid-template-columns:1fr; gap:10px; }
.scenario-card { background:var(--paper); border:1px solid var(--border); border-radius:4px; padding:14px 12px; }
.scenario-card h4 { font-size:11px; margin-bottom:8px; color:var(--text); font-family:monospace; }
.sc-row { display:flex; justify-content:space-between; font-size:11px; font-family:monospace; padding:4px 0; border-bottom:1px solid rgba(200,191,174,0.3); color:var(--text-muted); }
.sc-row:last-child { border-bottom:none; }
.sc-val { color:var(--text); } .sc-val.red { color:var(--rust); } .sc-val.green { color:var(--green); }
.spacer { height: 14px; }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="eyebrow">Retirement Planning Tool</div>
  <h1 data-i18n-html="heading">퇴직 후 <em>인출</em> 계산기</h1>
  <p class="subtitle" data-i18n="subtitle">은퇴 자산이 언제까지 버티는가 — 안전 인출률과 자산 소진 시점을 분석합니다</p>
</header>

<div class="section">
  <div class="section-title" data-i18n="sectionInput">계산 방식 선택</div>
  <div class="tabs">
    <button class="tab active" onclick="setMode('fixed')" id="tab-fixed">
      <span data-i18n="tabFixed">정액 인출</span><br>
      <small style="opacity:0.7" data-i18n="tabFixedSub">매달 고정 금액</small>
    </button>
    <button class="tab" onclick="setMode('rate')" id="tab-rate">
      <span data-i18n="tabRate">정률 인출</span><br>
      <small style="opacity:0.7" data-i18n="tabRateSub">잔액의 N% 매년</small>
    </button>
    <button class="tab" onclick="setMode('swr')" id="tab-swr">
      <span data-i18n="tabSwr">SWR 분석</span><br>
      <small style="opacity:0.7" data-i18n="tabSwrSub">안전 인출률 찾기</small>
    </button>
  </div>

  <div class="grid-2" style="margin-bottom:16px;">
    <div class="field">
      <label data-i18n="labelNest">은퇴 시작 자산</label>
      <div class="input-wrap"><span class="pfx" data-currency>₩</span><input type="number" id="nest" value="500000000" inputmode="numeric"></div>
    </div>
    <div class="field">
      <label data-i18n="labelStartYear">은퇴 시작 연도</label>
      <div class="input-wrap"><span class="pfx" style="font-size:10px">년</span><input type="number" id="startYear" value="2034" style="padding-left:24px;" inputmode="numeric"></div>
    </div>
  </div>

  <div id="mode-fixed">
    <div class="field" style="margin-bottom:16px;">
      <label data-i18n="labelMonthly">월 희망 생활비</label>
      <div class="input-wrap"><span class="pfx" data-currency>₩</span><input type="number" id="monthly" value="3000000" inputmode="numeric"></div>
    </div>
    <div class="range-block" style="margin-bottom:16px;">
      <div class="range-header">
        <span class="range-label" data-i18n="labelInflation">생활비 물가상승률 반영</span>
        <span class="range-val" id="inflLabel">2.0%</span>
      </div>
      <input type="range" id="inflation" min="0" max="10" step="0.1" value="2"
        oninput="document.getElementById('inflLabel').textContent=parseFloat(this.value).toFixed(1)+'%'">
    </div>
  </div>

  <div id="mode-rate" style="display:none;">
    <div class="range-block" style="margin-bottom:16px;">
      <div class="range-header">
        <span class="range-label" data-i18n="labelWRate">연간 인출률</span>
        <span class="range-val" id="rateLabel">4.0%</span>
      </div>
      <input type="range" id="wRate" min="1" max="15" step="0.1" value="4"
        oninput="document.getElementById('rateLabel').textContent=parseFloat(this.value).toFixed(1)+'%'">
    </div>
  </div>

  <div id="mode-swr" style="display:none;">
    <div class="field" style="margin-bottom:16px;">
      <label data-i18n="labelSwrYears">자산 유지 목표 기간</label>
      <div class="input-wrap"><span class="pfx" style="font-size:10px" data-i18n="unitYear">년</span><input type="number" id="swrYears" value="30" style="padding-left:24px;" inputmode="numeric"></div>
    </div>
  </div>

  <div class="range-block" style="margin-bottom:16px;">
    <div class="range-header">
      <span class="range-label" data-i18n="labelRetRate">포트폴리오 연평균 수익률</span>
      <span class="range-val" id="returnLabel">5.0%</span>
    </div>
    <input type="range" id="retRate" min="0" max="15" step="0.5" value="5"
      oninput="document.getElementById('returnLabel').textContent=parseFloat(this.value).toFixed(1)+'%'">
  </div>

  <div class="range-block" style="margin-bottom:16px;">
    <div class="range-header">
      <span class="range-label" data-i18n="labelLifespan">예측 기간 (기대 수명 기준)</span>
      <span class="range-val" id="lifeLabel">30<span data-i18n="unitYear">년</span></span>
    </div>
    <input type="range" id="lifespan" min="10" max="50" step="1" value="30"
      oninput="updateLifeLabel(this.value)">
  </div>
</div>

<div class="section">
  <div class="section-title" data-i18n="sectionPension">연금 설정 (다중 입력 가능)</div>
  <div id="pension-list">
    <!-- Pension items added here -->
  </div>
  <button class="btn outline" onclick="addPension()" data-i18n="btnAddPension">+ 연금 추가</button>
</div>

<div class="container">
  <button class="btn" onclick="calculate()" data-i18n="btnCalculate">✦ 계산하기</button>
</div>

<div class="results" id="results">
  <div class="kpi-row" id="kpiRow"></div>
  <div id="banner"></div>

  <div class="section">
    <div class="section-title" data-i18n="sectionChart">자산 잔액 추이</div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>

  <div class="section" id="scenarioSection" style="display:none;">
    <div class="section-title" data-i18n="sectionScenario">시나리오 비교</div>
    <div class="scenario-grid" id="scenarioGrid"></div>
  </div>

  <div class="section">
    <div class="section-title" data-i18n="sectionTable">연도별 인출 내역</div>
    <button class="table-toggle" id="tableToggleBtn" onclick="toggleTable()" data-i18n="btnTableExpand">▼ 상세 내역 보기</button>
    <div id="tableWrap" style="display:none;">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th data-i18n="thYear">연도</th>
              <th data-i18n="thNeeds">총 희망 생활비</th>
              <th data-i18n="thPension">연금 합계</th>
              <th data-i18n="thWithdraw">자산 인출액</th>
              <th data-i18n="thGain">운용수익</th>
              <th data-i18n="thBalance">연말 잔액</th>
              <th data-i18n="thDepletion">소진율</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</div>

<script src="chart.umd.min.js"></script>
<script>
// ── i18n ───────────────────────────────────────────────────────────────────
const i18n = {
  ko: {
    heading: '퇴직 후 <em>인출</em> 계산기',
    subtitle: '은퇴 자산이 언제까지 버티는가 — 안전 인출률과 자산 소진 시점을 분석합니다',
    sectionInput: '계산 방식 선택',
    tabFixed: '정액 인출', tabFixedSub: '매달 고정 금액',
    tabRate: '정률 인출', tabRateSub: '잔액의 N% 매년',
    tabSwr: 'SWR 분석', tabSwrSub: '안전 인출률 찾기',
    labelNest: '은퇴 시작 자산', labelStartYear: '은퇴 시작 연도',
    labelMonthly: '월 희망 생활비', labelInflation: '생활비 물가상승률 (연)',
    labelWRate: '연간 인출률', labelSwrYears: '자산 유지 목표 기간',
    labelRetRate: '포트폴리오 연평균 수익률', labelLifespan: '예측 기간 (기대 수명 기준)',
    sectionPension: '연금 설정 (다중 입력 가능)',
    labelPensionName: '연금 이름 (예: 국민연금)', labelPension: '월 수령액', labelPensionYear: '개시 연도',
    labelPensionInfl: '물가상승률 반영', optYes: '반영함', optNo: '고정액',
    btnAddPension: '+ 연금 추가',
    unitYear: '년', btnCalculate: '✦ 계산하기',
    kpiDuration: '자산 지속', kpiMonthly: '희망 생활비', kpiTotal: '총 자산 인출액', kpiBalance: '잔액',
    kpiDepleted: '소진됨', kpiRemains: '잔액 남음', kpiWithin: '기간 내 유지',
    kpiDepletedAt: (y, cy) => `${cy}년 소진`,
    kpiPlus: (n) => `${n}년+`,
    kpiAnnual: (v) => `연 ${v}원`,
    kpiOfPrincipal: (p) => `원금의 ${p}%`,
    bannerOk: (n, bal) => `${n}년 기간 동안 자산이 유지됩니다. 최종 잔액 <strong>${bal}</strong>이 남습니다.`,
    bannerNg: (y, cy, lack) => `은퇴 후 <strong>${y}년차</strong> (${cy}년)에 자산이 소진됩니다. 목표보다 <strong>${lack}년</strong> 부족합니다.`,
    swrDesc: (targetYears, monthly) => `월 ${monthly} 생활비 지출 시 ${targetYears}년간 자산 소진 없음`,
    sectionChart: '자산 잔액 추이', sectionScenario: '시나리오 비교', sectionTable: '연도별 인출 내역',
    btnTableExpand: '▼ 상세 내역 보기', btnTableCollapse: '▲ 상세 내역 접기',
    thYear: '연도', thNeeds: '총 희망 생활비', thWithdraw: '자산 인출액', thPension: '연금 합계', thGain: '운용수익', thBalance: '연말 잔액', thDepletion: '소진율',
    tagDepleted: '소진', tagEnd: '종료',
    scWithdrawRate: '인출률', scMonthly: '월 생활비', scDuration: '자산 지속', scBalance: '최종 잔액',
    scDepleted: (n) => `${n}년차 소진`, scSustained: (n) => `${n}년 유지`,
    chartBalance: '자산 잔액', chartWithdraw: '자산 인출액',
    yearRow: (cy, n) => `${cy}년 (${n}년차)`,
    scLabels: ['보수적 (SWR-1%)', '안전 인출률', '적극적 (SWR+1%)'],
    currencySymbol: '₩',
    fmt: (n) => {
      const abs = Math.abs(n), s = n < 0 ? '-' : '';
      if (abs >= 1e8) {
        const uk = Math.floor(abs / 1e8), man = Math.round((abs % 1e8) / 1e4);
        return s + uk + '억' + (man > 0 ? ' ' + man + '만' : '') + '원';
      }
      return s + Math.round(abs / 1e4) + '만원';
    },
    fmtShort: (n) => {
      const abs = Math.abs(n);
      if (abs >= 1e8) return (n / 1e8).toFixed(2) + '억';
      if (abs >= 1e4) return (n / 1e4).toFixed(0) + '만';
      return n.toFixed(0);
    },
  },
  en: {
    heading: 'Retirement <em>Withdrawal</em> Calculator',
    subtitle: 'How long will your nest egg last? Analyze safe withdrawal rates and depletion timing.',
    sectionInput: 'Calculation Mode',
    tabFixed: 'Fixed Amount', tabFixedSub: 'Set monthly expense',
    tabRate: 'Fixed Rate', tabRateSub: 'N% of balance yearly',
    tabSwr: 'SWR Analysis', tabSwrSub: 'Find safe rate',
    labelNest: 'Retirement Nest Egg', labelStartYear: 'Retirement Start Year',
    labelMonthly: 'Target Monthly Expense', labelInflation: 'Expense Inflation Rate (Annual)',
    labelWRate: 'Annual Withdrawal Rate', labelSwrYears: 'Target Sustainability Period',

      }

let currentLang = 'ko';
let mode = 'fixed';
let chartInst = null;
let pensionCounter = 0;

// ── 연금 입력 UI 관리 ───────────────────────────────────────────────────────
function addPension(name = '', amount = 0, year = 2045, inflation = 'true') {
  const id = pensionCounter++;
  const div = document.createElement('div');
  div.className = 'pension-item';
  div.id = `pension-item-${id}`;
  div.innerHTML = `
    <button class="remove-pension" onclick="removePension(${id})">×</button>
    <div class="field" style="margin-bottom:10px;">
      <label data-i18n="labelPensionName">연금 이름</label>
      <input type="text" class="p_name" value="${name}" placeholder="국민연금, 개인연금 등">
    </div>
    <div class="grid-2">
      <div class="field">
        <label data-i18n="labelPension">월 수령액</label>
        <div class="input-wrap"><span class="pfx" data-currency>₩</span><input type="number" class="p_amt" value="${amount}" inputmode="numeric"></div>
      </div>
      <div class="field">
        <label data-i18n="labelPensionYear">개시 연도</label>
        <div class="input-wrap"><span class="pfx" style="font-size:10px">년</span><input type="number" class="p_year" value="${year}" style="padding-left:24px;" inputmode="numeric"></div>
      </div>
    </div>
    <div class="range-block" style="margin-top:10px;">
      <div class="range-header">
        <span class="range-label" data-i18n="labelPensionInfl">물가상승률 반영</span>
        <select class="p_infl" style="width: auto; padding: 4px 8px; font-size: 12px; height: 32px;">
          <option value="true" ${inflation==='true'?'selected':''} data-i18n="optYes">반영함</option>
          <option value="false" ${inflation==='false'?'selected':''} data-i18n="optNo">고정액</option>
        </select>
      </div>
    </div>
  `;
  document.getElementById('pension-list').appendChild(div);
  applyTranslations();
}

function removePension(id) {
  const el = document.getElementById(`pension-item-${id}`);
  if (el) el.remove();
}

function getPensionData() {
  const items = document.querySelectorAll('.pension-item');
  const data = [];
  items.forEach(item => {
    data.push({
      name: item.querySelector('.p_name').value,
      amount: parseFloat(item.querySelector('.p_amt').value) || 0,
      startYear: parseInt(item.querySelector('.p_year').value) || 2045,
      inflation: item.querySelector('.p_infl').value === 'true'
    });
  });
  return data;
}

// ── 언어 적용 ───────────────────────────────────────────────────────────────
function setLanguage(lang) {
  if (!i18n[lang]) return;
  currentLang = lang;
  document.documentElement.lang = lang;
  applyTranslations();
  if (document.getElementById('results').classList.contains('visible')) calculate();
}

function applyTranslations() {
  const t = i18n[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (t[k] !== undefined) el.textContent = t[k];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const k = el.getAttribute('data-i18n-html');
    if (t[k] !== undefined) el.innerHTML = t[k];
  });
  updateLifeLabel(document.getElementById('lifespan').value);

  document.querySelectorAll('[data-currency]').forEach(el => {
    el.textContent = t.currencySymbol;
  });

  const tw = document.getElementById('tableWrap');
  if (tw) {
    document.getElementById('tableToggleBtn').textContent =
      tw.style.display === 'none' ? t.btnTableExpand : t.btnTableCollapse;
  }
}

function updateLifeLabel(val) {
  const t = i18n[currentLang];
  const el = document.getElementById('lifeLabel');
  if (el) el.textContent = val + t.unitYear;
}

function fmtFull(n) { return i18n[currentLang].fmt(n); }
function fmtShort(n) { return i18n[currentLang].fmtShort(n); }

function setMode(m) {
  mode = m;
  ['fixed', 'rate', 'swr'].forEach(x => {
    const el = document.getElementById('mode-' + x);
    if (el) el.style.display = x === m ? 'block' : 'none';
    const tab = document.getElementById('tab-' + x);
    if (tab) tab.classList.toggle('active', x === m);
  });
}

// ── 시뮬레이션 ──────────────────────────────────────────────────────────────
function simulate(nest, annualWithdrawal, returnRate, years, inflationRate, pensions, startYear) {
  const rows = [];
  let balance = nest, targetExpense = annualWithdrawal, depletedYear = null;

  // 연금 데이터 복제 (시뮬레이션 중 금액 업데이트용)
  const currentPensions = pensions.map(p => ({
    ...p,
    currentAnnual: p.amount * 12
  }));

  for (let y = 1; y <= years; y++) {
    const cy = startYear + y - 1;
    if (depletedYear) { rows.push({ y, targetExpense: 0, actualWithdraw: 0, pension: 0, gain: 0, balance: 0, depleted: true }); continue; }

    const gain = balance * (returnRate / 100);

    // 그해의 총 연금 합계 계산
    let totalP = 0;
    currentPensions.forEach(p => {
      if (cy >= p.startYear) totalP += p.currentAnnual;
    });

    const netWithdrawalNeeded = Math.max(0, targetExpense - totalP);
    const w = Math.min(netWithdrawalNeeded, balance + gain);

    balance = balance + gain - w;
    if (balance <= 0 && netWithdrawalNeeded > w) { balance = 0; depletedYear = y; }

    rows.push({ y, targetExpense, actualWithdraw: w, pension: totalP, gain, balance, depleted: balance <= 0 && netWithdrawalNeeded > w });

    // 내년도 타겟 업데이트
    targetExpense *= (1 + (inflationRate || 0) / 100);
    currentPensions.forEach(p => {
      if (p.inflation) p.currentAnnual *= (1 + (inflationRate || 0) / 100);
    });
  }
  return { rows, depletedYear };
}

// ── 계산 ────────────────────────────────────────────────────────────────────
function calculate() {
  const nest = parseFloat(document.getElementById('nest').value) || 0;
  const startYear = parseInt(document.getElementById('startYear').value) || 2034;
  const retRate = parseFloat(document.getElementById('retRate').value);
  const lifespan = parseInt(document.getElementById('lifespan').value);
  const pensions = getPensionData();

  if (mode === 'swr') { runSWR(nest, startYear, retRate, lifespan, pensions); return; }

  let annualWithdrawal, inflationRate = 0;
  if (mode === 'fixed') {
    annualWithdrawal = (parseFloat(document.getElementById('monthly').value) || 0) * 12;
    inflationRate = parseFloat(document.getElementById('inflation').value) || 0;
  } else {
    annualWithdrawal = nest * (parseFloat(document.getElementById('wRate').value) / 100);
    inflationRate = 2.0;
  }

  const { rows, depletedYear } = simulate(nest, annualWithdrawal, retRate, lifespan, inflationRate, pensions, startYear);
  renderResults(rows, depletedYear, nest, annualWithdrawal, startYear, lifespan, retRate);
}

function runSWR(nest, startYear, retRate, lifespan, pensions) {
  const targetYears = parseInt(document.getElementById('swrYears').value) || 30;
  let lo = 0, hi = 20, safeSWR = 0;
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    const { depletedYear } = simulate(nest, nest * mid / 100, retRate, targetYears, 2.0, pensions, startYear);
    if (!depletedYear) { lo = mid; safeSWR = mid; } else hi = mid;
  }
  const annualW = nest * safeSWR / 100;
  const { rows, depletedYear } = simulate(nest, annualW, retRate, lifespan, 2.0, pensions, startYear);
  const t = i18n[currentLang];
  const scenarios = t.scLabels.map((label, i) => {
    const rate = i === 0 ? Math.max(safeSWR - 1, 0.5) : i === 1 ? safeSWR : safeSWR + 1;
    const r = simulate(nest, nest * rate / 100, retRate, lifespan, 2.0, pensions, startYear);
    return { label, rate, monthly: nest * rate / 100 / 12, depletedYear: r.depletedYear, lastBalance: r.rows[r.rows.length - 1].balance };
  });
  renderResults(rows, depletedYear, nest, annualW, startYear, lifespan, retRate, safeSWR, annualW / 12, scenarios);
}

// ── 결과 렌더링 ─────────────────────────────────────────────────────────────
function renderResults(rows, depletedYear, nest, annualWithdrawal, startYear, lifespan, retRate, safeSWR, safeMonthly, scenarioData) {
  const t = i18n[currentLang];
  const lastRow = rows[rows.length - 1];
  const totalWithdrawnFromAssets = rows.reduce((s, r) => s + r.actualWithdraw, 0);
  const finalBalance = lastRow.balance;
  const endYear = startYear + lifespan - 1;

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi ${depletedYear ? 'danger' : 'success'}">
      <div class="kpi-label">${t.kpiDuration}</div>
      <div class="kpi-val ${depletedYear ? 'red' : 'green'}">${depletedYear ? depletedYear + t.unitYear : t.kpiPlus(lifespan)}</div>
      <div class="kpi-sub">${depletedYear ? t.kpiDepletedAt(depletedYear, startYear + depletedYear - 1) : t.kpiWithin}</div>
    </div>
    <div class="kpi warn">
      <div class="kpi-label">${t.kpiMonthly}</div>
      <div class="kpi-val gold">${fmtShort(annualWithdrawal / 12)}</div>
      <div class="kpi-sub">${t.kpiAnnual(fmtFull(annualWithdrawal))}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">${t.kpiTotal}</div>
      <div class="kpi-val">${fmtShort(totalWithdrawnFromAssets)}</div>
      <div class="kpi-sub">${t.kpiOfPrincipal((totalWithdrawnFromAssets / nest * 100).toFixed(0))}</div>
    </div>
    <div class="kpi ${finalBalance > 0 ? 'success' : 'danger'}">
      <div class="kpi-label">${endYear} ${t.unitYear} ${t.kpiBalance}</div>
      <div class="kpi-val ${finalBalance > 0 ? 'green' : 'red'}">${finalBalance > 0 ? fmtShort(finalBalance) : '0'}</div>
      <div class="kpi-sub">${finalBalance > 0 ? t.kpiRemains : t.kpiDepleted}</div>
    </div>
  `;

  let swrHtml = '';
  if (safeSWR) {
    swrHtml = `<div class="swr-banner">
      <div class="swr-rate">${safeSWR.toFixed(2)}%</div>
      <div class="swr-desc">${t.swrDesc(parseInt(document.getElementById('swrYears').value), fmtFull(safeMonthly))}</div>
    </div>`;
  }

  document.getElementById('banner').innerHTML = swrHtml + (depletedYear
    ? `<div class="banner ng"><span style="font-size:18px;">⚠️</span><span>${t.bannerNg(depletedYear, startYear + depletedYear - 1, lifespan - depletedYear)}</span></div>`
    : `<div class="banner ok"><span style="font-size:18px;">✓</span><span>${t.bannerOk(lifespan, fmtFull(finalBalance))}</span></div>`);

  if (chartInst) chartInst.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  chartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: rows.map(r => (startYear + r.y - 1) + (currentLang === 'en' ? '' : t.unitYear)),
      datasets: [
        {
          type: 'line', label: t.chartBalance, data: rows.map(r => Math.max(r.balance, 0)),
          borderColor: '#2a6640', backgroundColor: 'rgba(42,102,64,0.08)', fill: true, tension: 0.4,
          pointRadius: rows.length > 25 ? 0 : 3, borderWidth: 2, yAxisID: 'y'
        },
        {
          type: 'bar', label: t.chartWithdraw, data: rows.map(r => r.actualWithdraw),
          backgroundColor: 'rgba(139,105,20,0.2)', borderColor: 'rgba(139,105,20,0.4)', borderWidth: 1, yAxisID: 'y'
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#7a6e62', font: { family: 'JetBrains Mono', size: 10 }, boxWidth: 10 } },
        tooltip: {
          backgroundColor: 'white', borderColor: '#c8bfae', borderWidth: 1, titleColor: '#2a2420', bodyColor: '#7a6e62',
          callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmtFull(ctx.raw) }
        }
      },
      scales: {
        x: { ticks: { color: '#7a6e62', font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 12 }, grid: { color: 'rgba(200,191,174,0.3)' } },
        y: { ticks: { color: '#7a6e62', font: { family: 'JetBrains Mono', size: 10 }, callback: v => fmtShort(v) }, grid: { color: 'rgba(200,191,174,0.3)' } }
      }
    }
  });

  if (scenarioData) {
    document.getElementById('scenarioSection').style.display = 'block';
    document.getElementById('scenarioGrid').innerHTML = scenarioData.map(s => `
      <div class="scenario-card">
        <h4>${s.label}</h4>
        <div class="sc-row"><span>${t.scWithdrawRate}</span><span class="sc-val">${s.rate.toFixed(2)}%</span></div>
        <div class="sc-row"><span>${t.scMonthly}</span><span class="sc-val">${fmtFull(s.monthly)}</span></div>
        <div class="sc-row"><span>${t.scDuration}</span><span class="sc-val ${s.depletedYear ? 'red' : 'green'}">${s.depletedYear ? t.scDepleted(s.depletedYear) : t.scSustained(lifespan)}</span></div>
        <div class="sc-row"><span>${t.scBalance}</span><span class="sc-val ${s.lastBalance > 0 ? 'green' : 'red'}">${s.lastBalance > 0 ? fmtFull(s.lastBalance) : '0'}</span></div>
      </div>`).join('');
  } else {
    document.getElementById('scenarioSection').style.display = 'none';
  }

  document.getElementById('tbody').innerHTML = rows.map(r => {
    const cy = startYear + r.y - 1;
    const pct = r.balance > 0 ? ((nest - r.balance) / nest * 100).toFixed(0) + '%' : '100%';
    const isLast = r.y === lifespan;
    return `<tr class="${r.depleted ? 'depleted' : isLast ? 'last-year' : ''}">
      <td>${t.yearRow(cy, r.y)}${r.depleted ? `<span class="tag">${t.tagDepleted}</span>` : isLast ? `<span class="tag ok">${t.tagEnd}</span>` : ''}</td>
      <td>${fmtFull(r.targetExpense)}</td>
      <td>${r.pension > 0 ? `<span style="color:var(--green)">+${fmtFull(r.pension)}</span>` : '-'}</td>
      <td>${fmtFull(r.actualWithdraw)}</td>
      <td>+${fmtFull(r.gain)}</td>
      <td>${r.balance > 0 ? fmtFull(r.balance) : '<span style="color:var(--rust)">0</span>'}</td>
      <td>${pct}</td>
    </tr>`;
  }).join('');

  document.getElementById('results').classList.add('visible');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleTable() {
  const t = i18n[currentLang];
  const w = document.getElementById('tableWrap');
  const open = w.style.display === 'none';
  w.style.display = open ? 'block' : 'none';
  document.getElementById('tableToggleBtn').textContent = open ? t.btnTableCollapse : t.btnTableExpand;
}

calculate();
</script>
